services:
  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SERVER_ROOT_URL=http://my.grafana.server/
      - GF_PLUGINS_PREINSTALL=grafana-clock-panel, grafana-simple-json-datasource, grafana-clickhouse-datasource"
    ports:
      - '3000:3000'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - grafana_storage:/var/lib/grafanavolumes
      - ./provisioning:/etc/grafana/provisioning
    networks:
      - shared_network_local

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - '9094:9090'    # ← Port externe 9091 (9090 est occupé)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - shared_network_local

volumes:
  grafana_storage: {}
  prometheus_data: {}

networks:
  shared_network_local:
    external: true
